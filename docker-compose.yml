services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: apb
      POSTGRES_PASSWORD: apb
      POSTGRES_DB: apb
    ports:
      - "5432:5432"
    volumes:
      - apb_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U apb -d apb"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  apb_pgdata:
