<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Panoptes · live event intelligence</title>
<link rel="icon" type="image/png" href="/assets/logo.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link rel="stylesheet" href="https://unpkg.com/maplibre-gl@2.4.0/dist/maplibre-gl.css" />
<style>
  :root{
    --bg:#090b0f; --panel:#0d1015; --panel-2:#11151b; --raise:#161b22;
    --line:#1e242c; --line-2:#2a323c; --line-3:#39434f;
    --txt:#d7dde5; --txt-2:#aeb6c0; --dim:#6c7682; --dimmer:#49515b;
    --red:#a8202c; --amber:#e0a030; --steel:#5d6a78;
    /* compat aliases for inline-styled JS output */
    --hot:#a8202c; --warn:#e0a030; --accent:#a8202c;
    --font:"Archivo",system-ui,-apple-system,sans-serif;
    --mono:"IBM Plex Mono",ui-monospace,Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--txt);
    font-family:var(--font);font-size:13px;overflow:hidden;-webkit-font-smoothing:antialiased}
  .mono{font-family:var(--mono);font-feature-settings:"tnum" 1}
  .lab{font:600 9.5px/1 var(--font);letter-spacing:.18em;color:var(--dim);text-transform:uppercase}
  #map{position:absolute;inset:0;background:#12140f}
  .incident-field{pointer-events:none;mix-blend-mode:screen;opacity:.88}
  .environment-field{pointer-events:none;mix-blend-mode:screen;opacity:.8}
  .leaflet-container,.leaflet-interactive{cursor:crosshair!important}
  /* candle-dust grain over the basemap */
  #map::after{content:"";position:absolute;inset:0;z-index:300;pointer-events:none;
    background-image:radial-gradient(circle,rgba(228,192,118,.5) 0 .4px,transparent .65px),
      radial-gradient(circle,rgba(0,0,0,.6) 0 .5px,transparent .75px);
    background-position:0 0,3px 4px;background-size:7px 7px,9px 9px;
    opacity:.13;mix-blend-mode:soft-light}
  /* heavy vignette: the map reads like a lit table in a dark room */
  #map::before{content:"";position:absolute;inset:0;z-index:299;pointer-events:none;
    background:radial-gradient(ellipse 120% 92% at 50% 42%,transparent 58%,rgba(2,3,2,.38) 100%)}
  .leaflet-container{background:#12140f;font-family:var(--font)}
  .maplibregl-map,.maplibregl-canvas{font-family:var(--font);outline:none}

  /* ── classification banner ── */
  #classbar{position:absolute;top:0;left:0;right:0;height:22px;z-index:1100;
    background:#0b0e13;border-bottom:1px solid var(--line-2);
    display:flex;align-items:center;justify-content:center;gap:9px}
  #classbar b{font:600 9px/1 var(--font);letter-spacing:.34em;color:var(--steel);text-transform:uppercase}
  #classbar i{width:5px;height:5px;background:var(--amber);display:block}

  /* ── floating opaque panels (no blur, hairline, square-ish) ── */
  .hud{position:absolute;z-index:1000;background:var(--panel);
    border:1px solid var(--line-2);border-radius:3px;
    box-shadow:0 1px 0 rgba(0,0,0,.5), 0 12px 34px rgba(0,0,0,.30)}

  /* ── command bar ── */
  #top{top:30px;left:16px;right:16px;display:flex;align-items:center;gap:16px;
    padding:11px 16px;flex-wrap:wrap;border-top:2px solid var(--red)}
  #logo{height:44px;width:auto;display:block;margin:-6px 0}
  #top .brand{font-weight:700;letter-spacing:.26em;font-size:15px;color:var(--txt);
    background:none;-webkit-text-fill-color:currentColor}
  #top .sub{color:var(--dim);font-size:9px;letter-spacing:.2em;line-height:1.4;
    text-transform:uppercase;border-left:1px solid var(--line-3);padding-left:12px}
  #top .spacer{flex:1}
  .pill{display:flex;align-items:center;gap:7px;font:600 9.5px/1 var(--font);letter-spacing:.16em;
    color:var(--txt-2);height:26px;padding:0 11px;border:1px solid var(--line-2);
    border-radius:3px;background:var(--panel-2);text-transform:uppercase}
  #status{letter-spacing:.14em}
  #loadPill{color:var(--amber);border-color:rgba(224,160,48,.45);max-width:270px}
  #loadPill[hidden]{display:none}
  #loadText{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .loadmark{width:7px;height:7px;border:1px solid var(--amber);display:block;
    animation:loadstep 1s steps(2,end) infinite}
  @keyframes loadstep{50%{background:var(--amber);transform:rotate(45deg)}}
  #alertPill{cursor:pointer}
  .dot{width:7px;height:7px;border-radius:0;background:var(--red);
    box-shadow:none;animation:pulse 1.7s steps(1) infinite}
  @keyframes pulse{0%,55%{opacity:1}56%,100%{opacity:.3}}
  label.ctl{display:flex;flex-direction:column;gap:4px;
    font:600 8.5px/1 var(--font);letter-spacing:.18em;color:var(--dim);text-transform:uppercase}
  select,button{font-family:var(--font);background:var(--panel-2);color:var(--txt-2);
    border:1px solid var(--line-2);border-radius:3px;padding:0 10px;height:26px;
    font-size:11px;font-weight:500;letter-spacing:.02em;cursor:pointer}
  #window{font-family:var(--mono)}
  button:hover,select:hover{border-color:var(--line-3);color:var(--txt)}
  select:focus-visible,button:focus-visible,.row:focus-visible,.hchip:focus-visible,.hglbl:focus-visible{
    outline:2px solid var(--amber);outline-offset:2px}
  button.on{color:var(--txt);border-color:var(--line-3);background:var(--raise)}
  .segwrap{display:flex;gap:6px}
  /* own deck, right of the side panel; single row that scrolls instead of wrapping */
  #hazFilter{top:100px;left:352px;right:16px;padding:8px 12px;
    gap:10px;align-items:center;flex-wrap:nowrap;overflow-x:auto;overflow-y:hidden}
  #hazFilter::-webkit-scrollbar{height:6px}
  #hazFilter::-webkit-scrollbar-thumb{background:var(--line-3);border-radius:3px}
  .hazfilter{display:flex}
  .hgrp{display:flex;gap:4px;align-items:center;padding-right:8px;border-right:1px solid var(--line-2);flex:0 0 auto}
  .hgrp:last-child{border-right:none}
  .hglbl{font:700 8px/1 var(--font);letter-spacing:.14em;text-transform:uppercase;
    color:var(--dim);cursor:pointer;margin-right:2px;white-space:nowrap}
  .hglbl:hover{color:var(--txt-2)}
  .hazfilter .hchip{font:600 9px/1 var(--font);letter-spacing:.1em;text-transform:uppercase;
    padding:5px 8px;border:1px solid var(--line-2);border-radius:3px;cursor:pointer;flex:0 0 auto;
    color:var(--dim);background:var(--panel-2);display:flex;align-items:center;gap:5px;opacity:.45;white-space:nowrap}
  .hazfilter .hchip.on{opacity:1;color:var(--txt-2);border-color:var(--line-3)}
  .hazfilter .hchip i{width:7px;height:7px;border-radius:50%;background:var(--hcc);display:inline-block}
  .led{width:6px;height:6px;border-radius:0;background:var(--dimmer);display:inline-block;
    margin-right:6px;vertical-align:middle}
  button.on .led{background:var(--red)}
  button#surgesBtn.on .led{background:var(--amber)}

  /* ── incident rail (LEFT) ── */
  #side{top:100px;left:16px;width:320px;max-height:calc(100% - 196px);
    display:flex;flex-direction:column;padding:0;overflow:hidden}
  #sideTitle{margin:0;padding:14px 16px 0;font:600 9.5px/1 var(--font);
    letter-spacing:.18em;color:var(--dim);text-transform:uppercase}
  #count{font-family:var(--mono);font-size:28px;font-weight:600;line-height:1.1;
    letter-spacing:-.01em;padding:9px 16px 13px;border-bottom:1px solid var(--line)}
  #count small{font-family:var(--font);font-size:10px;color:var(--dim);font-weight:500;letter-spacing:.04em}
  #fieldKey{padding:7px 16px 8px;border-bottom:1px solid var(--line);display:flex;gap:5px 10px;
    flex-wrap:wrap;font:600 7px/1 var(--font);letter-spacing:.11em;color:var(--dimmer);text-transform:uppercase}
  #fieldKey .meaning{flex-basis:100%;color:var(--dim);letter-spacing:.14em;margin-bottom:1px}
  #fieldKey span:not(.meaning){display:flex;align-items:center;gap:4px}
  #fieldKey i{width:9px;height:2px;background:var(--fc);box-shadow:0 0 4px var(--fc);display:block}
  #feed{margin:0;padding:4px 16px 14px;overflow:auto;display:flex;flex-direction:column}
  #feed::-webkit-scrollbar{width:0}
  .row{padding:10px 0;border-top:1px solid var(--line);cursor:pointer;transition:background .12s}
  #feed .row:first-child{border-top:0}
  .row:hover{background:rgba(120,140,165,.045)}
  .row.recent{background:rgba(224,30,43,.06)}
  .row .t{display:flex;justify-content:space-between;align-items:baseline;gap:10px}
  .row .ty{text-transform:uppercase;letter-spacing:.06em;font-weight:600;font-size:11px;color:var(--txt)}
  .row .loc{color:var(--dim);font-size:10px;margin-top:4px;letter-spacing:.01em}
  .row .ago{color:var(--dim);font-size:9.5px;letter-spacing:.04em;font-family:var(--mono)}
  .sev{font-weight:600;font-family:var(--mono);font-size:12px;letter-spacing:.01em}
  .sev.hi{color:var(--red)} .sev.mid{color:var(--amber)} .sev.lo{color:var(--steel)}
  .badge{font-size:8px;padding:1px 5px;border-radius:0;letter-spacing:.13em;
    background:none;border:1px solid var(--red);color:var(--red);margin-left:7px;font-weight:600}
  .badge.new{border-color:var(--amber);color:var(--amber)}

  /* ── footer credit ── */
  #footer{bottom:18px;left:50%;transform:translateX(-50%);display:flex;align-items:center;
    gap:9px;padding:7px 14px;font:500 9.5px/1 var(--mono);color:var(--dim);letter-spacing:.05em;white-space:nowrap}
  #footer a{color:var(--txt-2);text-decoration:none}
  #footer a:hover{color:var(--txt)}
  #footer .sep{color:var(--line-3)}
  #footer .gh{display:inline-flex;align-items:center;gap:5px}
  #footer .gh svg{width:12px;height:12px;fill:currentColor}
  #footer #flogo{height:18px;width:auto;display:block}
  #footer .rainbow{position:relative}
  #footer .rainbow::after{content:"";position:absolute;left:0;right:0;bottom:-2px;height:2px;border-radius:2px;
    background:linear-gradient(90deg,#ff3b6b,#ffb02e,#37e0c4,#5b8cff,#b14bff,#ff3b6b);
    background-size:200% 100%;opacity:0;transition:opacity .2s}
  #footer .rainbow:hover::after{opacity:1;animation:rainbow 1.1s linear infinite}
  @keyframes rainbow{to{background-position:200% 0}}

  /* ── leaflet zoom (top-right, under command bar) ── */
  .leaflet-top.leaflet-right{top:100px;right:16px}
  .leaflet-control-zoom{border:1px solid var(--line-2)!important;border-radius:3px!important;
    overflow:hidden;box-shadow:0 1px 0 rgba(0,0,0,.5)!important}
  .leaflet-control-zoom a{background:var(--panel)!important;color:var(--txt-2)!important;
    border:0!important;width:28px;height:28px;line-height:28px;font-size:15px}
  .leaflet-control-zoom a:hover{background:var(--raise)!important;color:var(--txt)!important}
  .leaflet-control-zoom a+a{border-top:1px solid var(--line)!important}
  .leaflet-control-attribution{margin:0 16px 12px 0!important;padding:4px 7px!important;
    background:rgba(9,11,9,.88)!important;color:#8a7f5c!important;border:1px solid #35311f;
    border-radius:2px;font:500 8px/1.2 var(--mono)!important}
  .leaflet-control-attribution a{color:#c4b382!important;text-decoration:none}

  /* ── popups ── */
  .leaflet-popup-content-wrapper{background:var(--panel);color:var(--txt);
    border:1px solid var(--line-2);border-radius:3px;font-family:var(--font);
    box-shadow:0 14px 34px rgba(0,0,0,.55)}
  .leaflet-popup-tip{background:var(--panel);border:1px solid var(--line-2)}
  .leaflet-popup-content{margin:0;min-width:240px;max-width:300px}
  .pop{padding:13px 15px}
  .pop .kick{font:600 9px/1 var(--mono);letter-spacing:.18em;text-transform:uppercase;color:var(--red);
    margin-bottom:8px;display:flex;align-items:center;gap:7px}
  .pop .kick::before{content:"";width:6px;height:6px;background:currentColor;display:inline-block}
  .pop .ttl{font:700 14px/1.25 var(--font);letter-spacing:.02em;color:var(--txt);
    display:flex;align-items:center;justify-content:space-between;gap:10px}
  .pop .chip{font:600 11px/1 var(--mono);padding:3px 7px;border:1px solid var(--line-2);border-radius:3px;flex:0 0 auto}
  .pop .chip.hi{color:var(--red);border-color:var(--red)}
  .pop .chip.mid{color:var(--amber);border-color:var(--amber)}
  .pop .chip.lo{color:var(--steel)}
  .pop .sum{font-size:12px;color:var(--txt-2);margin-top:9px;line-height:1.5}
  .pop .meta{font:500 10px/1.5 var(--mono);color:var(--dim);margin-top:7px;letter-spacing:.02em}
  .pop .arts{margin-top:11px;border-top:1px solid var(--line);padding-top:10px;display:flex;flex-direction:column;gap:10px}
  .pop .art a{color:var(--txt-2);text-decoration:none;font-size:11.5px;line-height:1.35;font-weight:500;display:block}
  .pop .art a:hover{color:var(--txt)}
  .pop .src{font:500 9.5px/1 var(--mono);color:var(--dimmer);margin-top:4px;letter-spacing:.02em}
  .pop .empty{font:500 11px/1 var(--mono);color:var(--dim);margin-top:9px}
  .pop .f{font-size:11px;color:var(--dim);margin-top:4px;font-family:var(--mono)}

  /* ── new-incident ping (one-shot ring, no glow) ── */
  .ping span{position:absolute;left:0;top:0;width:14px;height:14px;margin:-7px 0 0 -7px;
    border-radius:50%;border:1.5px solid var(--accent);
    animation:ping 2s ease-out forwards;pointer-events:none}
  .ping.hi span{border-color:var(--hot)}
  .ping.mid span{border-color:var(--warn)}
  @keyframes ping{0%{transform:scale(.3);opacity:.9}100%{transform:scale(5);opacity:0}}
  @keyframes fade{0%{opacity:0}15%{opacity:1}100%{opacity:0}}

  /* ── surge: soft pulsing area glow (the one kept data pulse) ── */
  .surge-halo span{position:absolute;width:46px;height:46px;margin:-23px 0 0 -23px;
    border-radius:50%;pointer-events:auto;cursor:pointer;
    background:radial-gradient(circle,rgba(224,30,43,.34),rgba(224,30,43,0) 70%);
    animation:surgepulse 2.8s ease-in-out infinite}
  @keyframes surgepulse{0%,100%{transform:scale(.65);opacity:.45}50%{transform:scale(1.15);opacity:.9}}

  .haz i{display:block;width:7px;height:7px;font-size:0;background:var(--hc);border-radius:50%;
    box-shadow:0 0 0 1px rgba(0,0,0,.55),0 0 5px var(--hc);pointer-events:auto;cursor:pointer}
  button#hazardsBtn.on .led{background:#37c0d8}
  button#warningsBtn.on .led{background:#d98a2b}
  button#envBtn.on .led{background:#718b88}
  button#goesBtn.on .led{background:#7fb8e0}
  button#radarBtn.on .led{background:#62cf72;box-shadow:0 0 7px rgba(98,207,114,.65)}
  #envReadout{right:16px;bottom:48px;padding:8px 11px;max-width:430px;
    font:500 9px/1.45 var(--mono);color:var(--dim);letter-spacing:.035em}
  #envReadout b{color:var(--txt-2);font-weight:600}
  #envReadout i{display:inline-block;width:8px;height:2px;background:var(--ec);margin-right:5px;vertical-align:middle}

  /* ── compact density ── */
  body.compact #side{width:300px}
  body.compact #top{padding:8px 14px;gap:12px}
  body.compact #count{font-size:23px;padding:7px 16px 10px}
  body.compact .row{padding:7px 0}
  body.compact #feed{padding:2px 16px 10px}
  body.compact select,body.compact button{height:24px}
  body.compact .pill{height:24px}

  @media (max-width:760px){
    #classbar b{letter-spacing:.16em}
    #top{left:8px;right:8px;top:28px;gap:8px;padding:9px;max-height:31vh;
      overflow:auto;align-content:flex-start}
    #top .spacer{display:none}
    #top .brand{font-size:15px}
    #top .sub,#footer,#envReadout{display:none}
    #top .ctl{flex:1 1 42%;min-width:130px}
    #top select{width:100%;max-width:none}
    #side{left:8px;right:8px;bottom:8px;top:auto;width:auto;height:34vh;max-height:310px}
    #hazFilter{left:8px;right:8px;top:calc(31vh + 38px);max-height:18vh;overflow:auto}
    .leaflet-top.leaflet-right{top:35vh;right:8px}
    .leaflet-control-attribution{margin:0 8px calc(34vh + 14px) 0!important;font-size:7px!important}
  }

  @media (prefers-reduced-motion:reduce){
    .dot,.loadmark,.surge-halo span,.ping span{animation:none!important}
  }
</style>
</head>
<body>
<div id="map"></div>

<div id="classbar"><i></i><b id="classText">OSINT · Public-Safety Radio · Aggregated</b><i></i></div>

<div id="top" class="hud">
  <img id="logo" src="/assets/logo.png" alt="Panoptes" />
  <span class="brand">PANOPTES</span>
  <span class="sub">All-Seeing<br/>Event Intelligence</span>
  <span class="spacer"></span>
  <label class="ctl">Area<select id="metro"><option>loading feeds…</option></select></label>
  <label class="ctl">Window<select id="window" title="time window">
    <option value="0.0833" selected>LIVE · 5M</option>
    <option value="0.25">15 MIN</option>
    <option value="1">1 HOUR</option>
    <option value="6">6 HOURS</option>
    <option value="12">12 HOURS</option>
    <option value="24">24 HOURS</option>
    <option value="168">1 WEEK</option>
  </select></label>
  <label class="ctl">Type<select id="type"><option value="">ALL TYPES</option></select></label>
  <label class="ctl">Severity<select id="minThreat">
    <option value="0">ALL</option>
    <option value="0.4">ELEVATED ≥0.40</option>
    <option value="0.7">HIGH ≥0.70</option>
  </select></label>
  <label class="ctl">Alerts<span class="segwrap">
    <button id="spikesBtn" class="on" aria-pressed="true" title="emphasize high-threat activity"><span class="led"></span>SPIKES</button>
    <button id="surgesBtn" class="on" aria-pressed="true" title="surge-anomaly alerts"><span class="led"></span>SURGES</button>
    <button id="warningsBtn" class="on" aria-pressed="true" title="active NWS warning footprints"><span class="led"></span>WARNINGS</button>
    <button id="hazardsBtn" aria-pressed="false" title="quakes, weather, wildfire, traffic, aircraft, declarations"><span class="led"></span>HAZARDS</button>
    <button id="envBtn" class="on" aria-pressed="true" title="combined thermal, moisture, rain, UV and air-quality field"><span class="led"></span>ENV</button>
    <button id="radarBtn" aria-pressed="false" title="live CONUS NEXRAD base reflectivity"><span class="led"></span>RADAR</button>
    <button id="goesBtn" aria-pressed="false" title="live GOES GeoColor satellite imagery (real clouds, ~10 min old)"><span class="led"></span>GOES</button>
  </span></label>
  <span class="spacer"></span>
  <span class="pill" id="loadPill" role="status" aria-live="polite" hidden>
    <span class="loadmark"></span><span id="loadText">LOADING</span></span>
  <span class="pill"><span class="dot"></span><span id="status" role="status" aria-live="polite">LIVE</span></span>
  <span class="pill" id="alertPill" style="display:none;border-color:var(--hot);color:var(--hot)">
    <span id="alertCount">0</span> SURGE</span>
</div>

<div id="envReadout" class="hud" hidden></div>

<!-- Hazard family filter: its own single-row deck (shown only while HAZARDS is on) -->
<div id="hazFilter" class="hud hazfilter" style="display:none"></div>

<div id="side" class="hud">
  <h3 id="sideTitle">ACTIVE INCIDENTS</h3>
  <div id="count" role="status" aria-live="polite">0<small> in view</small></div>
  <div id="fieldKey" aria-label="Incident light colors">
    <span class="meaning">Light = activity above local rate</span>
    <span style="--fc:#b96a66"><i></i>Violence</span><span style="--fc:#c8894d"><i></i>Fire</span>
    <span style="--fc:#a97979"><i></i>Medical</span><span style="--fc:#b3a05e"><i></i>Traffic</span>
    <span style="--fc:#8f7f9f"><i></i>Suspicious</span><span style="--fc:#718b88"><i></i>Public</span>
  </div>
  <div id="feed"></div>
</div>

<div id="footer" class="hud">
  <span>© 2026 PANOPTES</span><span class="sep">·</span>
  <span>built by</span>
  <img src="/assets/liquid.gif" alt="Sardistic" id="flogo" />
  <a href="https://sardistic.com" target="_blank" rel="noopener" class="rainbow">sardistic.com</a>

<script src="https://unpkg.com/maplibre-gl@2.4.0/dist/maplibre-gl.js"></script>

<script>
'use strict';

// Every feed is untrusted input, even when it comes from a public authority.
// Keep HTML templates readable while escaping all values that cross into them.
const esc = value => String(value ?? '').replace(/[&<>"]/g, ch => ({
  '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;'
}[ch]));
const safeLink = value => {
  try {
    const u = new URL(String(value || ''), window.location.origin);
    return ['http:', 'https:'].includes(u.protocol) ? u.href : '';
  } catch (_) { return ''; }
};
// Reference-counted because SSE snapshots and manual layer toggles can overlap.
// The pill names actual pending data instead of displaying an ambiguous spinner.
const activeLoads=new Map();
let loadTicker=null,completedLoad=null,completedTimer=null;
function updateLoadPill(){
  const pill=document.getElementById('loadPill'),now=performance.now();
  const labels=[...activeLoads.entries()].map(([label,r])=>`${label} ${((now-r.started)/1000).toFixed(1)}s`);
  pill.hidden=!labels.length&&!completedLoad;
  document.getElementById('loadText').textContent=labels.length
    ? `LOADING · ${labels.slice(0,2).join(' + ')}${labels.length>2?` +${labels.length-2}`:''}`
    : completedLoad ? `LOADED · ${completedLoad.label} ${completedLoad.seconds.toFixed(1)}s` : 'LOADING';
}
function beginLoad(label){
  const r=activeLoads.get(label)||{count:0,started:performance.now()}; r.count++;
  activeLoads.set(label,r); completedLoad=null; clearTimeout(completedTimer); updateLoadPill();
  if(!loadTicker) loadTicker=setInterval(updateLoadPill,200);
}
function endLoad(label){
  const r=activeLoads.get(label); if(!r) return;
  if(--r.count>0) activeLoads.set(label,r);
  else{
    activeLoads.delete(label);
    completedLoad={label,seconds:(performance.now()-r.started)/1000};
    clearTimeout(completedTimer); completedTimer=setTimeout(()=>{completedLoad=null;updateLoadPill();},2200);
  }
  if(!activeLoads.size){clearInterval(loadTicker);loadTicker=null;}
  updateLoadPill();
}
async function withLoad(label,fn){
  beginLoad(label); try{return await fn();} finally{endLoad(label);}
}
function watchTiles(label,layers,timeout=15000){
  if(!layers.length) return;
  beginLoad(label); let left=layers.length, finished=false;
  const done=()=>{ if(finished) return; if(--left>0) return; finished=true; endLoad(label); };
  layers.forEach(layer=>{
    let settled=false;
    const one=()=>{ if(!settled){ settled=true; done(); } };
    layer.once('load',one); layer.once('tileerror',one);
  });
  setTimeout(()=>{ if(!finished){ finished=true; endLoad(label); } },timeout);
}
const CENTERS = {};            // metro -> [lat,lon], from /live/metros
const LIVE_METROS = new Set(); // all metros from /live/metros are live CAD

const map = L.map('map',{zoomControl:false,attributionControl:true,preferCanvas:true})
  .setView([39.5, -98.35], 4);   // canvas renderer: thousands of incident dots stay fast
map.attributionControl.setPrefix(false);
map.attributionControl.addAttribution('© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> · © <a href="https://carto.com/attributions">CARTO</a> · Terrain <a href="https://registry.opendata.aws/terrain-tiles/">Mapzen/AWS</a> · Lights <a href="https://earthdata.nasa.gov/gibs">NASA</a> · Environment <a href="https://open-meteo.com/">Open-Meteo</a> / CAMS');
L.control.zoom({position:'topright'}).addTo(map);

// Zoom ramp for the city-lights glow; f scales overall intensity so the breathing
// animation can swell the whole ramp without touching the zoom fade-out.
const lightsRamp = f => ['interpolate',['linear'],['zoom'],3,.68*f,7,.58*f,10,.3*f,12,0];

// Dark-fantasy cartography over Carto's dark-matter vectors: near-black ink land,
// abyssal water with a glowing antique coast rule, ember roads, dashed gold marches,
// and real terrain via keyless Terrarium DEM tiles lit like candlelight from the NW.
function atlasStyle(sourceStyle){
  const style = structuredClone(sourceStyle);
  style.name = 'Panoptes Umbral Atlas';
  const ink = '#14170f', abyss = '#080b0f', gold = '#b0a173';
  let waterFill = null, forestSource = null, forestInsert = -1, backgroundIndex = 0;

  style.sources['panoptes-dem'] = {
    type:'raster-dem', encoding:'terrarium', tileSize:256, maxzoom:13,
    tiles:['https://s3.amazonaws.com/elevation-tiles-prod/terrarium/{z}/{x}/{y}.png'],
    attribution:'Terrain: Mapzen/AWS'
  };
  // NASA earth-at-night: settlements glow like scattered embers on the black land
  style.sources['panoptes-nightlights'] = {
    type:'raster', tileSize:256, maxzoom:8,
    tiles:['https://gibs.earthdata.nasa.gov/wmts/epsg3857/best/VIIRS_CityLights_2012/default/default/GoogleMapsCompatible_Level8/{z}/{y}/{x}.jpg'],
    attribution:'City lights: NASA GIBS'
  };

  style.layers.forEach((layer, index) => {
    if(layer.ref) return;
    const id = String(layer.id || '').toLowerCase();
    const sourceLayer = String(layer['source-layer'] || '').toLowerCase();
    const isWater = sourceLayer.includes('water') || id.includes('water');
    const isRoad = sourceLayer.includes('transportation') || /road|street|motorway|bridge|tunnel/.test(id);
    const isBoundary = sourceLayer.includes('boundary') || id.includes('boundary');
    const isPark = /park|nature|reserve/.test(id);

    layer.paint ||= {};
    if(layer.type === 'background'){
      layer.paint['background-color'] = ink;
      backgroundIndex = index;
    }else if(layer.type === 'fill'){
      if(isWater){
        layer.paint['fill-color'] = abyss;
        layer.paint['fill-opacity'] = 1;
        delete layer.paint['fill-outline-color'];
        waterFill ||= {layer, index};
      }else if(sourceLayer === 'landcover'){
        layer.paint['fill-color'] = ['match',['get','class'],
          ['wood','forest'],'#212816',['grass','scrub'],'#252415',['sand'],'#2a2517','#1e1e14'];
        layer.paint['fill-opacity'] = .5;
        forestSource ||= layer;
        forestInsert = index;
      }else if(isPark){
        layer.paint['fill-color'] = '#252e19';
        layer.paint['fill-opacity'] = .42;
      }else if(sourceLayer.includes('building')){
        layer.paint['fill-color'] = '#24261b';
        layer.paint['fill-opacity'] = .45;
      }else{
        layer.paint['fill-color'] = ink;
        layer.paint['fill-opacity'] = layer.paint['fill-opacity'] ?? .15;
      }
    }else if(layer.type === 'line'){
      if(isWater){
        layer.paint['line-color'] = '#1e2c35';
        layer.paint['line-opacity'] = .45;
      }else if(isBoundary){
        layer.layout = {...(layer.layout||{}), visibility:'none'};   // no borders on the umbral chart
      }else if(isRoad){
        const casing = /case|casing/.test(id);
        layer.paint['line-color'] = casing ? '#060705'
          : /motorway|trunk/.test(id) ? '#4e4128' : '#2e2b1f';
        layer.paint['line-opacity'] = casing ? .6 : /motorway|trunk/.test(id) ? .45 : .26;
      }else{
        layer.paint['line-color'] = '#232118';
        layer.paint['line-opacity'] = .3;
      }
    }else if(layer.type === 'symbol'){
      const waterLabel = isWater || /marine|ocean|sea/.test(id);
      layer.paint['text-color'] = waterLabel ? '#48596a' : gold;
      layer.paint['text-halo-color'] = waterLabel ? abyss : '#0a0b08';
      layer.paint['text-halo-width'] = 1.2;
      layer.paint['text-halo-blur'] = .5;
      layer.paint['text-opacity'] = .85;
    }
  });

  // City lights sit directly on the background; the hillshade's shadows and amber
  // highlights draw over them (cities are mostly flat, so the glow survives), and the
  // opaque abyss water above both keeps oceans clean. Lights fade out by street zoom,
  // where the 8-zoom raster would smear.
  style.layers.splice(backgroundIndex + 1, 0, {
    id:'umbral-city-lights', type:'raster', source:'panoptes-nightlights',
    paint:{
      'raster-opacity':lightsRamp(1),
      'raster-contrast':.15,
      'raster-saturation':-.3,
      'raster-hue-rotate':-12
    }
  },{
    id:'umbral-hillshade', type:'hillshade', source:'panoptes-dem',
    paint:{
      'hillshade-exaggeration':.85,
      'hillshade-shadow-color':'rgba(0,0,0,.8)',
      'hillshade-highlight-color':'rgba(190,48,56,.38)',
      'hillshade-accent-color':'rgba(168,32,44,.22)',
      'hillshade-illumination-direction':340,
      'hillshade-illumination-anchor':'map'
    }
  });
  if(waterFill && waterFill.index >= backgroundIndex) waterFill.index += 2;
  if(forestInsert >= backgroundIndex) forestInsert += 2;

  if(waterFill){
    const base = waterFill.layer;
    const coast = {
      id:'atlas-coast-double-rule',type:'line',source:base.source,
      'source-layer':base['source-layer'],minzoom:base.minzoom,maxzoom:base.maxzoom,
      paint:{'line-color':'rgba(196,179,130,.3)','line-width':.6,'line-gap-width':2,'line-opacity':.6}
    };
    if(base.filter) coast.filter = base.filter;
    style.layers.splice(waterFill.index + 1, 0, coast);
    if(forestInsert > waterFill.index) forestInsert++;
  }
  if(forestSource){
    style.layers.splice(forestInsert + 1, 0, {
      id:'atlas-forest-engraving',type:'fill',source:forestSource.source,
      'source-layer':forestSource['source-layer'],
      filter:['match',['get','class'],['wood','forest'],true,false],
      paint:{'fill-color':'#293418','fill-opacity':.55}
    });
  }
  return style;
}

function installAtlasTextures(gl){
  // aged black paper: mostly darkness, a scatter of gold dust, faint contour-esque strokes
  const paper = document.createElement('canvas');
  paper.width = paper.height = 64;
  const pctx = paper.getContext('2d');
  pctx.fillStyle = '#14170f';
  pctx.fillRect(0,0,64,64);
  let seed = 7319;
  const random = () => ((seed = (seed * 16807) % 2147483647) - 1) / 2147483646;
  for(let i=0;i<900;i++){
    const shade = random()>.42 ? '0,0,0' : '216,178,102';
    pctx.fillStyle = `rgba(${shade},${(.02 + random()*.05).toFixed(3)})`;
    const size = random()>.94 ? 1.2 : .55;
    pctx.fillRect(random()*64,random()*64,size,size);
  }
  pctx.strokeStyle = 'rgba(196,168,100,.035)';
  pctx.lineWidth = .45;
  for(let y=7;y<64;y+=13){
    pctx.beginPath();pctx.moveTo(0,y);pctx.bezierCurveTo(18,y-2,43,y+2,64,y-.5);pctx.stroke();
  }
  gl.addImage('atlas-parchment',pctx.getImageData(0,0,64,64),{pixelRatio:1});
  const background = gl.getStyle().layers.find(layer => layer.type === 'background');
  if(background) gl.setPaintProperty(background.id,'background-pattern','atlas-parchment');

  const forest = document.createElement('canvas');
  forest.width = forest.height = 16;
  const ctx = forest.getContext('2d');
  ctx.strokeStyle = 'rgba(126,148,86,.5)';ctx.lineWidth = 1;
  [[3,4],[11,2],[7,11],[15,9]].forEach(([x,y]) => {
    ctx.beginPath();ctx.moveTo(x-2,y+2);ctx.lineTo(x,y-2);ctx.lineTo(x+2,y+2);ctx.stroke();
    ctx.beginPath();ctx.moveTo(x-1.5,y);ctx.lineTo(x,y-3);ctx.lineTo(x+1.5,y);ctx.stroke();
  });
  gl.addImage('atlas-tree-hatch',ctx.getImageData(0,0,16,16),{pixelRatio:1});
  if(gl.getLayer('atlas-forest-engraving'))
    gl.setPaintProperty('atlas-forest-engraving','fill-pattern','atlas-tree-hatch');
}

// Lighting is an indicator, not ambient animation. Visible incident energy raises
// city-light contrast and brightness when data changes; the GPU is otherwise idle.
let cityLightLevel=-1;
function setCityLightSignal(gl, level=0){
  if(!gl?.getLayer('umbral-city-lights') || Math.abs(level-cityLightLevel)<.04) return;
  cityLightLevel=level;
  gl.setPaintProperty('umbral-city-lights','raster-contrast',.16+.16*level);
  gl.setPaintProperty('umbral-city-lights','raster-brightness-max',.9+.1*level);
  gl.setPaintProperty('umbral-city-lights','raster-opacity',lightsRamp(1+.12*level));
}

beginLoad('BASEMAP');
fetch('https://basemaps.cartocdn.com/gl/dark-matter-gl-style/style.json')
  .then(response => {
    if(!response.ok) throw new Error(`atlas style ${response.status}`);
    return response.json();
  })
  .then(sourceStyle => {
    const atlas = L.maplibreGL({style:atlasStyle(sourceStyle),interactive:false}).addTo(map);
    const gl = atlas.getMaplibreMap();
    gl.once('load',() => { installAtlasTextures(gl); glMapRef = gl;
      cityLightLevel=-1; setCityLightSignal(gl,0); updateCelestial(); });
  })
  .catch(error => {
    console.warn('Umbral atlas unavailable; using fallback tiles.',error);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{maxZoom:19}).addTo(map);
  }).finally(()=>endLoad('BASEMAP'));

// ── celestial lighting: the map is lit by the real sky ──────────────────────
// Not tinted films: a two-channel lighting rig. A SCREEN-blended pane ADDS light
// (golden day warmth, the blazing terminator ember, glint on water — the basemap
// brightens through it), and a MULTIPLY-blended pane REMOVES it (night deepens to
// indigo; blacks stay black instead of graying out). Identity colors — black for
// screen, white for multiply — make full daylight a true no-op.
map.createPane('skylight'); map.createPane('skydark');
map.getPane('skylight').style.cssText += ';z-index:351;mix-blend-mode:screen;pointer-events:none';
map.getPane('skydark').style.cssText  += ';z-index:352;mix-blend-mode:multiply;pointer-events:none';
const RAD = Math.PI/180;
const skyDays = () => Date.now()/86400000 + 2440587.5 - 2451545;   // days since J2000
const gmstDeg = d => ((280.46061837 + 360.98564736629*d) % 360 + 360) % 360;
function sunEq(d){
  const L = 280.460 + .9856474*d, g = (357.528 + .9856003*d)*RAD;
  const lam = (L + 1.915*Math.sin(g) + .02*Math.sin(2*g))*RAD, eps = 23.439*RAD;
  return {dec:Math.asin(Math.sin(eps)*Math.sin(lam)),
          ra:Math.atan2(Math.cos(eps)*Math.sin(lam), Math.cos(lam))/RAD};
}
function moonEq(d){
  const L = (218.316 + 13.176396*d)*RAD, M = (134.963 + 13.064993*d)*RAD,
        F = (93.272 + 13.22935*d)*RAD;
  const lam = L + 6.289*RAD*Math.sin(M), beta = 5.128*RAD*Math.sin(F), eps = 23.439*RAD;
  return {dec:Math.asin(Math.sin(beta)*Math.cos(eps) + Math.cos(beta)*Math.sin(eps)*Math.sin(lam)),
          ra:Math.atan2(Math.sin(lam)*Math.cos(eps) - Math.tan(beta)*Math.sin(eps), Math.cos(lam))/RAD};
}
// altitude/azimuth (azimuth from north, clockwise) of a body seen from [lat,lon]
function altAz(eq, d, lat, lon){
  const H = ((gmstDeg(d) + lon - eq.ra)%360)*RAD, phi = lat*RAD;
  const alt = Math.asin(Math.sin(phi)*Math.sin(eq.dec) + Math.cos(phi)*Math.cos(eq.dec)*Math.cos(H));
  const az = Math.atan2(Math.sin(H), Math.cos(H)*Math.sin(phi) - Math.tan(eq.dec)*Math.cos(phi))/RAD + 180;
  return {alt:alt/RAD, az:(az + 360)%360};
}
// One offscreen pass computes per-pixel sun altitude across the world (in mercator
// rows, so every consumer maps it linearly) and renders three canvases: the GL
// day-mask that hides city lights under sunlight, and the screen/multiply lighting
// pair. Sky colour comes from piecewise ramps over sun altitude, baked into a LUT.
const SKY_W = 256, SKY_H = 256, MERC_LAT = 85.051129;
const maskCanvas = document.createElement('canvas');
const lightCanvas = document.createElement('canvas');
const darkCanvas = document.createElement('canvas');
[maskCanvas, lightCanvas, darkCanvas].forEach(c => { c.width = SKY_W; c.height = SKY_H; });
// The sunset line is NOT geometric altitude 0°: atmospheric refraction lifts the
// solar disc ~34′ at the horizon, and sunset is defined by the UPPER LIMB touching
// it (+16′ semi-diameter) — the sun has visibly set when its centre reaches −0.833°.
// Below that runs the defined twilight ladder: civil −6° (terrain still sky-lit),
// nautical −12° (horizon gone), astronomical −18° (sky fully dark).
const SUNSET_ALT = -0.833;
// What the sun ADDS (screen blend: black = nothing added) — and dawn ≠ dusk.
// Evening air carries a day's worth of convected aerosols, dust and moisture, so
// sunsets burn deeper red-orange; overnight the boundary layer settles and dawns
// come through cleaner, cooler air — pale rose-gold with a violet cast. Each
// terminator limb gets its own ramp, blended where the limbs meet at the
// noon/midnight meridians (where sunrise and sunset literally merge).
const DUSK_STOPS = [[-90,0,0,0],[-11,0,0,0],[-6,14,4,10],[-2.8,40,14,16],
  [-0.833,74,32,14],[2.2,64,34,14],[8,36,24,10],[20,14,10,5],[90,10,8,4]];
const DAWN_STOPS = [[-90,0,0,0],[-11,0,0,0],[-6,12,6,16],[-2.8,34,18,28],
  [-0.833,64,34,26],[2.2,54,34,20],[8,32,24,12],[20,13,10,6],[90,10,8,4]];
// what the night TAKES AWAY (multiply blend: white = nothing removed), keyed to
// the twilight definitions — full dark arrives only past astronomical twilight
const DARK_STOPS = [[-90,112,122,174],[-18,112,122,174],[-12,150,152,192],
  [-6,200,196,210],[-0.833,244,241,240],[1,255,255,255],[90,255,255,255]];
// the ground itself under sunlight — the day mask is painted as sunlit soil, not a
// glow veil. This is what makes daylight interact with the map: the land warms and
// lifts exactly where the sun stands, and the hillshade carves shadows into it.
// Warm umber by day (G ≤ R — no green cast), blushing at true sunset.
const GROUND_STOPS = [[-90,20,23,15],[-9,20,23,15],[-2.8,34,28,17],
  [-0.833,44,33,18],[4,38,34,20],[15,35,33,19],[90,35,33,19]];
function skyRamp(stops, alt){
  let a = stops[0], b = stops[stops.length-1];
  for(let k = 1; k < stops.length; k++)
    if(alt <= stops[k][0]){ a = stops[k-1]; b = stops[k]; break; }
  const t = b[0] === a[0] ? 0 : (alt - a[0])/(b[0] - a[0]);
  return [1,2,3].map(j => a[j] + (b[j] - a[j])*t);
}
const SKY_N = 1024, SKY_LUT = (() => {            // indexed by sin(altitude)
  const dusk = new Uint8ClampedArray(SKY_N*3), dawn = new Uint8ClampedArray(SKY_N*3),
        dark = new Uint8ClampedArray(SKY_N*3), ground = new Uint8ClampedArray(SKY_N*3);
  for(let k = 0; k < SKY_N; k++){
    const alt = Math.asin(-1 + 2*k/(SKY_N - 1))/RAD;
    skyRamp(DUSK_STOPS, alt).forEach((v,j) => dusk[k*3+j] = v);
    skyRamp(DAWN_STOPS, alt).forEach((v,j) => dawn[k*3+j] = v);
    skyRamp(DARK_STOPS, alt).forEach((v,j) => dark[k*3+j] = v);
    skyRamp(GROUND_STOPS, alt).forEach((v,j) => ground[k*3+j] = v);
  }
  return {dusk, dawn, dark, ground};
})();
function paintSky(sun, G){
  const mctx = maskCanvas.getContext('2d'),
        lctx = lightCanvas.getContext('2d'),
        dctx = darkCanvas.getContext('2d');
  const mimg = mctx.createImageData(SKY_W, SKY_H),
        limg = lctx.createImageData(SKY_W, SKY_H),
        dimg = dctx.createImageData(SKY_W, SKY_H);
  const sinD = Math.sin(sun.dec), cosD = Math.cos(sun.dec);
  const cosH = new Float64Array(SKY_W), wMorn = new Float64Array(SKY_W);
  for(let x = 0; x < SKY_W; x++){
    const H = ((G - 180 + 360*(x + .5)/SKY_W - sun.ra)%360)*RAD;
    cosH[x] = Math.cos(H);
    // which limb of the terminator: sin H < 0 -> local morning (sun rising there)
    let w = (.15 - Math.sin(H))/.3;
    w = w < 0 ? 0 : w > 1 ? 1 : w;
    wMorn[x] = w*w*(3 - 2*w);
  }
  // city lights ignite through dusk, centred on true (refracted) sunset
  const DAY_HI = Math.sin((SUNSET_ALT+5)*RAD), DAY_LO = Math.sin((SUNSET_ALT-8)*RAD);
  for(let y = 0; y < SKY_H; y++){
    const lat = 2*Math.atan(Math.exp(Math.PI*(1 - 2*(y + .5)/SKY_H))) - Math.PI/2;
    const s1 = Math.sin(lat)*sinD, s2 = Math.cos(lat)*cosD;
    for(let x = 0; x < SKY_W; x++){
      const sa = s1 + s2*cosH[x];                // sin(sun altitude) at this pixel
      const i = (y*SKY_W + x)*4;
      const k = 3*Math.round((sa + 1)*.5*(SKY_N - 1));
      let dm = (sa - DAY_LO)/(DAY_HI - DAY_LO);
      dm = dm < 0 ? 0 : dm > 1 ? 1 : dm; dm = dm*dm*(3 - 2*dm);
      mimg.data[i] = SKY_LUT.ground[k]; mimg.data[i+1] = SKY_LUT.ground[k+1];
      mimg.data[i+2] = SKY_LUT.ground[k+2]; mimg.data[i+3] = dm*255;
      const wm = wMorn[x], we = 1 - wm;
      limg.data[i]   = SKY_LUT.dusk[k]*we   + SKY_LUT.dawn[k]*wm;
      limg.data[i+1] = SKY_LUT.dusk[k+1]*we + SKY_LUT.dawn[k+1]*wm;
      limg.data[i+2] = SKY_LUT.dusk[k+2]*we + SKY_LUT.dawn[k+2]*wm;
      limg.data[i+3] = 255;

// One screen-binned canvas replaces two heat canvases and thousands of raw points.

const FIELD_COLORS={
  violence:'#b96a66', fire:'#c8894d', medical:'#a97979',
  traffic:'#b3a05e', suspicious:'#8f7f9f', public:'#718b88', other:'#7d8173'
};
function incidentFamily(type){
  const t=String(type||'').toLowerCase();
  if(/shoot|gun|weapon|assault|robbery|stabb|violent|homicide/.test(t)) return 'violence';
  if(/fire|smoke|explosion|hazmat/.test(t)) return 'fire';
  if(/medical|ems|overdose|cardiac|injur|welfare/.test(t)) return 'medical';
  if(/traffic|crash|collision|vehicle|road/.test(t)) return 'traffic';
  if(/suspicious|disturb|alarm|burglary|theft/.test(t)) return 'suspicious';

function hexRgb(hex){ return [1,3,5].map(i=>parseInt(hex.slice(i,i+2),16)); }
const IncidentField=L.Layer.extend({

  onAdd(m){

  },
  onRemove(m){ m.off('resize',this.redraw,this); this._canvas.remove(); },
  setData(data){ this._data=data||[]; this.redraw(); },
  redraw(){

    const m=this._map,size=m.getSize(),dpr=Math.min(1.5,window.devicePixelRatio||1),z=m.getZoom();
    this._canvas.width=Math.round(size.x*dpr); this._canvas.height=Math.round(size.y*dpr);
    this._canvas.style.width=`${size.x}px`; this._canvas.style.height=`${size.y}px`;
    L.DomUtil.setPosition(this._canvas,m.containerPointToLayerPoint([0,0]));
    const ctx=this._canvas.getContext('2d'); ctx.setTransform(dpr,0,0,dpr,0,0);
    const cell=z<6?34:z<9?28:z<12?22:18,bins=new Map(),now=Date.now()/1000;

      const key=`${Math.floor(p.x/cell)},${Math.floor(p.y/cell)}`;

const ENV_COLORS={thermal:'#b7836b',moisture:'#668791',rain:'#527c98',uv:'#b49b64',aqi:'#82728b'};

  const apparent=+d.apparent_c||+d.temperature_c||0,dew=+d.dewpoint_c||0,rh=+d.humidity||0;

    rain:Math.min(1,((+d.rain_6h_mm||0)+(+d.precipitation_mm||0)*2)/18),
    uv:Math.min(1,(+d.uv||0)/11),

const EnvironmentField=L.Layer.extend({
  initialize(){this._data=[];},
  onAdd(m){

  },
  onRemove(m){m.off('resize',this.redraw,this);this._canvas.remove();},
  setData(data){this._data=data||[];this.redraw();},
  redraw(){
    if(!this._map||!this._canvas)return;
    const m=this._map,size=m.getSize(),dpr=Math.min(1.1,window.devicePixelRatio||1),z=m.getZoom();
    this._canvas.width=Math.round(size.x*dpr);this._canvas.height=Math.round(size.y*dpr);
    this._canvas.style.width=`${size.x}px`;this._canvas.style.height=`${size.y}px`;

    const ctx=this._canvas.getContext('2d');ctx.setTransform(dpr,0,0,dpr,0,0);

function ago(ts){
  if(!ts) return '';
  const s = Date.now()/1000 - ts;
  if(s<1) return 'now';                 // future/sub-second -> 'now', never '0s ago'
  if(s<60) return Math.floor(s)+'s ago';
  if(s<3600) return Math.floor(s/60)+'m ago';
  if(s<86400) return Math.floor(s/3600)+'h ago';
  return Math.floor(s/86400)+'d ago';
}

// Fast cluster context paints first; incidents replace it immediately on arrival;

let secondaryRefresh=null, secondaryRefreshedAt=0;
async function refreshSecondary(force=false,skipEmerging=false){
  if(!isNational()) return;
  if(secondaryRefresh) return secondaryRefresh;
  if(!force && Date.now()-secondaryRefreshedAt<45000) return;
  const scope=document.getElementById('metro').value;
  secondaryRefresh=(async()=>{
    const jobs=[loadAlerts(),loadFused(),loadSocial(),loadWarnings(),loadEnvironment()];
    if(!skipEmerging) jobs.unshift(loadEmerging());
    if(showHazards) jobs.push(loadHazards());
    await Promise.all(jobs);
    secondaryRefreshedAt=Date.now();
    if(scope===document.getElementById('metro').value && isNational()) draw();
  })().finally(()=>{ secondaryRefresh=null; });
  return secondaryRefresh;
}

async function load(providedData=null,forceContext=false){

  const w = winHours();
  let url, label;
  if(metro==='__all__'){ url=`/live/overview?max_age_hours=${w}`; label=`NATIONAL · ${winLabel()}`; }
  else if(LIVE_METROS.has(metro)){ url=`/live/incidents?metro=${metro}&max_age_hours=${w}`; label=`LIVE · ${winLabel()}`; }
  else { return; }

  let data=providedData, previewed=false;
  try{
    if(data===null){
      if(isNational() && !currentData.length){
        if(emergingClusters.length) drawEmergingPreview();
        else await loadEmerging(true);        // smallest useful payload becomes first paint
        previewed=true;
      }
      data=await withLoad('INCIDENTS',async()=>{
        const response=await fetch(url);
        if(!response.ok) throw new Error(`incidents ${response.status}`);
        return response.json();
      });
    }
  }
  catch(e){ document.getElementById('status').textContent='OFFLINE'; return; }
  document.getElementById('status').textContent = label;
  currentData = data.filter(d=>d.lat!=null && d.lon!=null);
  refreshTypeOptions();
  if(!isNational()){ alertLayer.clearLayers(); fusedLayer.clearLayers(); socialLayer.clearLayers(); }
  // Primary data paints now. Context is deliberately not on this critical path.
  draw();
  pingNew(inView(applyFilters(currentData)));

    if(isNational()) map.fitBounds(US_BOUNDS,{padding:[20,20]});
    else map.fitBounds(currentData.map(d=>[d.lat,d.lon]),{padding:[40,40],maxZoom:14});

// ── draw: filtered + viewport-scoped render, city bubbles vs incident detail ──
// dot size grows with zoom so dots stay readable from country to street level
const HIGH_THREAT = 0.8;
let activityPoints = [];

function eventWeight(d, now){
  const windowSeconds=Math.max(300, +winHours()*3600);
  const age=Math.max(0, now-(+d.ts||now));
  const recency=Math.max(.16, Math.exp(-age/(windowSeconds*.42)));
  return Math.min(1, (.2+.8*(+d.threat_score||0))*recency);
}
function alertWeight(d,now){
  const threat=+d.threat_score||0,rate=Math.min(1,(rateSignalByMetro.get(d.metro)||0)/4);
  // Routine urban volume stays close to the VIIRS baseline. Rate deviation,
  // severity, and emerging classification are what make a cell visibly lift.
  const gain=.28+.42*rate+.3*threat;
  return Math.min(1,eventWeight(d,now)*gain*(d.emerging?1.22:1));
}

function drawActivityField(){
  const now=Date.now()/1000;
  incidentField.setData(showSpikes?activityPoints:activityPoints.filter(d=>d.threat_score<HIGH_THREAT));
  const energy=activityPoints.reduce((n,d)=>n+alertWeight(d,now),0);
  setCityLightSignal(glMapRef,Math.min(1,Math.log1p(energy)/Math.log(90)));
}

// At detail zoom incidents resolve as short light ticks, not a field of static dots.
// Geographic length is calculated from screen pixels so ticks remain crisp by zoom.
function incidentTick(d,z){
  const t=+d.threat_score||0, px=3+t*7;
  const metresPerPixel=156543.03*Math.cos(d.lat*Math.PI/180)/Math.pow(2,z);
  const dy=px*metresPerPixel/111320;
  return L.polyline([[d.lat-dy*.5,d.lon],[d.lat+dy*.5,d.lon]],{
    color:sevColor(t),weight:t>=HIGH_THREAT?2.4:1.5,opacity:.45+.5*t,
    lineCap:'round',interactive:true
  }).on('click',()=>openIncident(d));
}

function screenOffset(lat,lon,dx,dy,z){
  const mpp=156543.03*Math.cos(lat*Math.PI/180)/Math.pow(2,z);
  return [lat-dy*mpp/111320,lon+dx*mpp/(111320*Math.max(.2,Math.cos(lat*Math.PI/180)))];
}

// Corroboration is a forked intelligence beacon: convergence without another ring.
function fusedBeacon(e,z){
  const size=5+Math.min(6,Math.log2(1+(+e.count||0))), c=[e.lat,e.lon];
  return L.polyline([
    screenOffset(e.lat,e.lon,0,size,z),c,
    screenOffset(e.lat,e.lon,-size*.72,-size*.5,z),c,
    screenOffset(e.lat,e.lon,size*.72,-size*.5,z)
  ],{color:'#d2a34a',weight:1.7,opacity:.9,lineCap:'square',lineJoin:'miter',interactive:true});
}

// Social evidence is a quiet diagonal stroke; corroborated posts receive a second
// parallel stroke. Both stay on the shared Leaflet canvas—no animated DOM glyphs.
function socialSignal(s,z,corro){
  const size=corro?5:3.5, lines=[L.polyline([
    screenOffset(s.lat,s.lon,-size,size,z),screenOffset(s.lat,s.lon,size,-size,z)
  ],{color:'#4fb7bd',weight:corro?1.8:1.2,opacity:corro?.9:.48,interactive:true})];
  if(corro) lines.push(L.polyline([
    screenOffset(s.lat,s.lon,-size+2,size,z),screenOffset(s.lat,s.lon,size+2,-size,z)
  ],{color:'#d2a34a',weight:1,opacity:.72,interactive:true}));
  return L.featureGroup(lines);

function draw(){
  const scoped = inView(applyFilters(currentData));
  markers.clearLayers();
  const z = map.getZoom();
  activityPoints=scoped;
  drawActivityField();
  scoped.slice().sort((a,b)=>(b.threat_score-a.threat_score)||((b.ts||0)-(a.ts||0)))
    .slice(0,250).forEach(d=>{
    if(z<12 || (!showSpikes && d.threat_score>=HIGH_THREAT)) return;
    incidentTick(d,z).addTo(markers);
  });
  // multi-source corroborated events: warm forked beacons, never generic rings
  fusedLayer.clearLayers();
  const fb=map.getBounds();
  fusedEvents.filter(e=>e.lat!=null && fb.contains([e.lat,e.lon])).forEach(e=>{
    const m=fusedBeacon(e,z);
    m.bindTooltip(`CORROBORATED · ${esc(Object.keys(e.sources||{}).join('+'))} · ${Number(e.count)||0} signals`,{direction:'top'});
    m.on('click',()=>showCorrelation(e.lat,e.lon,Object.keys(e.types||{}).slice(0,3).join(','),
      `<div class="meta">${esc(String(e.assessment||'single_source').replace(/_/g,' '))} · score ${(+e.surge_score).toFixed(2)} · `
      +`${esc(Object.entries(e.sources||{}).map(([k,v])=>k+' '+v).join(' · '))} · conf ${(+e.confidence).toFixed(2)} · severity ${(+e.mean_severity).toFixed(2)}</div>`));
    m.addTo(fusedLayer);
  });
  // social/news firehose — canvas slashes; a gold twin marks corroboration
  socialLayer.clearLayers();
  const officialCells=new Set(currentData.map(d=>`${Math.floor(d.lat*4)},${Math.floor(d.lon*4)}`));
  const nearOfficial=s=>{
    const y=Math.floor(s.lat*4),x=Math.floor(s.lon*4);
    for(let dy=-1;dy<=1;dy++) for(let dx=-1;dx<=1;dx++)
      if(officialCells.has(`${y+dy},${x+dx}`)) return true;
    return false;
  };
  socialPosts.filter(s=>s.lat!=null && fb.contains([s.lat,s.lon]))
    .map(s=>({s,corro:nearOfficial(s)}))
    .filter(x=>z>=9||x.corro).slice(0,120).forEach(({s,corro})=>{
    const m=socialSignal(s,z,corro);
    m.bindTooltip(`SOCIAL · ${esc(s.source||'bluesky')}${corro?' · near official activity':''}`,{direction:'top'});
    m.on('click',()=>openSocial(s,corro));
    m.addTo(socialLayer);
  });
  drawHazards();
  drawEnvironment();
  updateCount(scoped);
  if(isNational()) renderEmergingPanel();
  else renderIncidentPanel(scoped);
}

// Each family is a `category` keyed off the row's `source`, independently filterable.
const HAZ_STYLE = {
  quake:      {c:'#b06be0', g:'Q', label:'EARTHQUAKE'},
  weather:    {c:'#37c0d8', g:'W', label:'WEATHER ALERT'},

  volcano:    {c:'#d2492a', g:'^', label:'VOLCANO'},

  marine:     {c:'#2c7fa0', g:'M', label:'MARINE'},

// Split NWS alerts (source='nws') into filterable sub-families by event name.
function nwsSub(summary){
  const t=(summary||'').toLowerCase();
  // IPAWS civil alerts relayed through NWS — never style these as weather
  if(/civil danger|civil emergency|law enforcement warning|evacuation immediate|shelter in place|hazardous materials warning|911 telephone outage|child abduction|radiological|nuclear power plant|fire warning/.test(t)) return 'civil';
  if(/tsunami/.test(t)) return 'tsunami';
  if(/tornado/.test(t)) return 'tornado';
  if(/flood|hydrolog/.test(t)) return 'flood';
  if(/red flag|fire weather/.test(t)) return 'fire';
  if(/marine|small craft|gale|coastal|beach hazard|rip current|high surf/.test(t)) return 'marine';
  if(/winter|snow|ice|blizzard|freez|wind chill|frost/.test(t)) return 'winter';
  if(/heat/.test(t)) return 'heat';
  if(/thunderstorm|severe/.test(t)) return 'severe';
  return 'weather';
}
// row.source -> category key (drives style + the filter chips).
function hazCat(d){
  switch(d.source){
    case 'usgs': return 'quake';
    case 'nws':  return nwsSub(d.summary);
    case 'eonet':return d.type==='fire'?'fire':'weather';
    case 'volcano': return 'volcano';
    case 'hms_smoke': return 'smoke';
    case 'ndbc': return 'marine';
    case 'spc': return d.report_type==='torn'?'tornado':'severe';
    case 'nhc': return 'cyclone';
    case 'faa_delay': return 'delay';
    case 'airnow': return 'airquality';
    case 'acled': return 'unrest';
    case 'firms':return 'fire';
    case 'nifc_fire': return 'fire';
    case '511':  return 'traffic';
    case 'adsb': return 'aircraft';
    case 'aisstream': return 'maritime';
    case 'fema': return 'declaration';
    case 'faa_tfr': return 'tfr';
    case 'odin': return 'outage';
    case 'usgs_flood': return 'flood';
    case 'openaq': return 'airquality';
    case 'emsc': return 'quake';
    case 'gdacs': return d.event_type==='WF'?'fire'
      : d.event_type==='EQ'?'quake' : d.event_type==='TC'?'cyclone'
      : d.event_type==='FL'?'flood' : 'disaster';
    case 'sigmet': return d.hazard==='ASH'?'volcano':'severe';
    case 'amtrak': return 'rail';
    case 'squawk': return 'aircraft';
    default: return d.type==='traffic'?'traffic':'weather';
  }
}

function drawHazards(){
  hazardLayer.clearLayers();
  if(!showHazards&&!showWarnings) return;
  const b=map.getBounds();
  const rows=[...(showWarnings?warningData:[]),...(showHazards?hazardData:[])];
  rows.filter(d=>b.contains([d.lat,d.lon]) && hazCats.has(d._cat))
    .sort((a,b)=>(b.threat_score||0)-(a.threat_score||0)).slice(0,260).forEach(d=>{
    const st = HAZ_STYLE[d._cat] || HAZ_STYLE.weather;
    const tooltip=`${esc(d.event||st.label)}${d.source?' · '+esc(d.source):''}`;
    const popupHtml=()=>`<div class="pop"><div class="kick" style="color:${st.c}">${esc(st.label)}</div>`
      +`<div class="sum">${esc((d.headline||d.summary||'').slice(0,260))}</div>`
      +(d.description?`<div class="meta">${esc(d.description.slice(0,520))}</div>`:'')
      +(d.instruction?`<div class="sum" style="color:${st.c}">${esc(d.instruction.slice(0,360))}</div>`:'')
      +`<div class="meta">${esc(d.location||'')} · ${esc(d.severity||'severity '+(+d.threat_score).toFixed(2))}`
      +`${d.urgency?' · '+esc(d.urgency):''}${d.certainty?' · '+esc(d.certainty):''} · ${esc(ago(d.ts))}</div>`
      +(d.expires?`<div class="meta">expires ${esc(new Date(d.expires).toLocaleString())}</div>`:'')
      +`</div>`;
    // CAP polygon is the intelligence. Render its actual warning footprint; use a
    // point only for zone-only alerts where NWS did not publish polygon geometry.
    if(d.source==='nws' && d.geometry && /Polygon/.test(d.geometry.type||'')){
      const area=L.geoJSON(d.geometry,{style:{color:st.c,weight:1.25,opacity:.82,
        fillColor:st.c,fillOpacity:.11,dashArray:d.certainty==='Observed'?null:'4 3'}});
      area.bindTooltip(tooltip,{sticky:true});
      area.on('click',e=>L.popup({maxWidth:340}).setLatLng(e.latlng)
        .setContent(popupHtml()).openOn(map));
      area.addTo(hazardLayer);
      return;
    }
    const m=L.marker([d.lat,d.lon],{icon:L.divIcon({className:'haz',iconSize:[8,8],
      iconAnchor:[4,4],
      html:`<i style="--hc:${st.c}"></i>`})});
    m.bindTooltip(tooltip,{direction:'top'});
    m.on('click',()=>L.popup({maxWidth:340}).setLatLng([d.lat,d.lon])
      .setContent(popupHtml()).openOn(map));
    m.addTo(hazardLayer);
  });
}

// ── new-incident pings (scoped to view) ──────────────────────────────────────
function pingNew(pts){
  if(!primed){ pts.forEach(d=>seenIds.add(d.call_id)); primed=true; return; }
  const fresh = pts.filter(d=>!seenIds.has(d.call_id));
  fresh.forEach(d=>seenIds.add(d.call_id));
  fresh.slice(0,80).forEach(d=>{
    const sev=d.threat_score>=0.7?'hi':d.threat_score>=0.45?'mid':'';
    const m=L.marker([d.lat,d.lon],{icon:L.divIcon({className:'ping '+sev,
      html:'<span></span>',iconSize:[0,0]}),interactive:false}).addTo(pingLayer);
    setTimeout(()=>pingLayer.removeLayer(m),2100);
  });
  if(fresh.length){
    const c=document.getElementById('count'), tag=document.createElement('span');
    tag.textContent=` +${fresh.length} new`;
    tag.style.cssText='color:var(--red);font-family:var(--mono);font-size:12px;font-weight:600;'
      +'margin-left:8px;animation:fade 3s ease-out forwards';
    c.appendChild(tag); setTimeout(()=>tag.remove(),3000);
  }
}

// ── news correlation (shared by spikes, surge alerts, and incidents) ─────────
function artRows(arts,n){
  return arts.slice(0,n).map(a=>{
    const url=safeLink(a.url);
    const title=esc((a.title||'(untitled)').slice(0,92));
    const source=esc(a.domain||'')+esc(a.at?' · '+ago(new Date(a.at).getTime()/1000):'');
    return `<div class="art">${url?`<a href="${esc(url)}" target="_blank" rel="noopener noreferrer">${title}</a>`:`<span>${title}</span>`}`
      +`<div class="src">${source}</div></div>`;
  }).join('');
}
// r = /correlate payload: {articles (GDELT), local (news-RSS buffer), throttled}
function articlesHtml(r){
  const gdelt=r.articles||[], local=(r.local||[]).filter(a=>!gdelt.some(g=>g.url===a.url));
  if(!gdelt.length && !local.length)
    return r.throttled ? '<div class="empty">news search busy — try again in a minute</div>'
                       : '<div class="empty">no matching news · last 3d</div>';
  let h='<div class="arts">'+artRows(gdelt,4);
  if(local.length) h+=`<div class="src" style="margin-top:6px;opacity:.6">nearby local headlines</div>`+artRows(local,3);
  return h+'</div>';
}
async function fetchCorrelation(lat,lon,types){
  const ctl=new AbortController(); const t=setTimeout(()=>ctl.abort(),20000);
  try{
    const r=await fetch(`/correlate?lat=${lat}&lon=${lon}&types=${types||''}`,{signal:ctl.signal});
    if(!r.ok) return {articles:[],local:[],error:true};
    return await r.json();
  }
  catch(e){ return {articles:[],local:[],error:true}; }
  finally{ clearTimeout(t); }
}
// Open a popup that fills in "possible cause" news once the correlator responds.
function showCorrelation(lat,lon,types,headerHtml){
  const pop=L.popup({maxWidth:320}).setLatLng([lat,lon])
    .setContent('<div class="pop"><div class="kick">Correlating</div><div class="meta">searching news near here…</div></div>')
    .openOn(map);
  fetchCorrelation(lat,lon,types).then(r=>{
    if(!map.hasLayer(pop)) return;              // user closed it while we searched
    const place=esc(r.place?`${r.place}${r.state?', '+r.state:''}`:'this area');
    pop.setContent(`<div class="pop"><div class="kick">Possible Cause</div>`
      +`<div class="ttl">${place}</div>`+(headerHtml||'')
      +(r.error?'<div class="empty">news search failed — retry shortly</div>':articlesHtml(r))+`</div>`);
  });
}

  try{ feeds = await (await fetch(`/feeds?lat=${d.lat}&lon=${d.lon}&radius_m=1000`)).json(); }catch(e){}
  const cls=sevClass(d.threat_score);
  const base=`<div class="pop"><div class="ttl">${esc(String(d.type||'incident').replace(/_/g,' ').toUpperCase())}`
    +`<span class="chip ${cls}">${d.threat_score.toFixed(2)}</span></div>`
    +(d.summary?`<div class="sum">${esc(d.summary)}</div>`:'')
    +`<div class="meta">${esc(d.location||'')} · ${esc(d.sentiment)} · ${esc(ago(d.ts))}</div>`
    +`<div class="meta">${feeds.length?`${feeds.length} nearby feed(s)`:'no public feeds nearby'}</div>`;
  const pop=L.popup().setLatLng([d.lat,d.lon])
    .setContent(base+`<div class="meta" style="opacity:.55">checking news…</div></div>`)
    .openOn(map);
  fetchCorrelation(d.lat,d.lon,d.type).then(r=>{       // incident-level correlation
    if(!map.hasLayer(pop)) return;
    const any=(r.articles||[]).length || (r.local||[]).length;
    pop.setContent(base+(any
      ? `<div class="kick" style="margin-top:11px">Possible Cause</div>`+articlesHtml(r)
      : `<div class="empty">${r.throttled?'news search busy — try again in a minute':'no related news nearby'}</div>`)+`</div>`);
  });
}

// Filter chips grouped by domain (built once; shown only while HAZARDS is on).
// Clicking a group label toggles every chip in that group.
const HAZ_GROUPS = [
  ["Storm",  ["weather","severe","tornado","winter","heat","tsunami","cyclone"]],
  ["Water",  ["flood","marine","maritime"]],
  ["Fire/Air",["fire","smoke","airquality","volcano","quake"]],
  ["Transport",["traffic","aircraft","tfr","delay","rail"]],
  ["Infra",  ["outage","declaration","disaster"]],
  ["Civil",  ["unrest","civil"]],
];
(function buildHazChips(){
  const bar=document.getElementById('hazFilter');
  const chipFor=cat=>{
    const st=HAZ_STYLE[cat]; if(!st) return null;
    const chip=document.createElement('span');
    chip.className='hchip on'; chip.dataset.cat=cat;
    chip.tabIndex=0; chip.setAttribute('role','button'); chip.setAttribute('aria-pressed','true');
    chip.style.setProperty('--hcc',st.c);
    chip.innerHTML=`<i></i>${st.label.split(' ')[0]}`;
    chip.title=st.label;
    chip.onclick=()=>{
      if(hazCats.has(cat)) hazCats.delete(cat); else hazCats.add(cat);
      chip.classList.toggle('on',hazCats.has(cat));
      chip.setAttribute('aria-pressed',String(hazCats.has(cat)));
      drawHazards();              // filter already-loaded data, no refetch
    };
    chip.onkeydown=e=>{ if(e.key==='Enter'||e.key===' '){ e.preventDefault(); chip.click(); } };
    return chip;
  };
  HAZ_GROUPS.forEach(([name,cats])=>{
    const grp=document.createElement('span'); grp.className='hgrp';
    const lbl=document.createElement('span'); lbl.className='hglbl'; lbl.textContent=name;
    lbl.tabIndex=0; lbl.setAttribute('role','button');
    const chips=cats.map(chipFor).filter(Boolean);
    lbl.onclick=()=>{                // group toggle: all-off if any on, else all-on
      const anyOn=cats.some(c=>hazCats.has(c));
      cats.forEach((c,i)=>{ anyOn?hazCats.delete(c):hazCats.add(c);
        if(chips[i]){ chips[i].classList.toggle('on',hazCats.has(c));
          chips[i].setAttribute('aria-pressed',String(hazCats.has(c))); } });
      drawHazards();
    };
    lbl.onkeydown=e=>{ if(e.key==='Enter'||e.key===' '){ e.preventDefault(); lbl.click(); } };
    grp.appendChild(lbl); chips.forEach(c=>grp.appendChild(c));
    bar.appendChild(grp);
  });
})();

// Current CONUS NEXRAD base reflectivity. IEM mosaics the NWS radar network into
// one cache-friendly WMS; refresh the image on the native five-minute cadence.
map.createPane('radar');
map.getPane('radar').style.zIndex=215;
map.getPane('radar').style.pointerEvents='none';
map.getPane('radar').style.mixBlendMode='screen';
let radarLayer=null, radarTimer=null;
function setRadar(on){
  const btn=document.getElementById('radarBtn');
  btn.classList.toggle('on',on); btn.setAttribute('aria-pressed',String(on));
  if(on && !radarLayer){
    radarLayer=L.tileLayer.wms('https://mesonet.agron.iastate.edu/cgi-bin/wms/nexrad/n0q.cgi?',{
      layers:'nexrad-n0q-900913',format:'image/png',transparent:true,opacity:.58,
      pane:'radar',attribution:'NEXRAD mosaic © NOAA / Iowa Environmental Mesonet'
    }).addTo(map);
    watchTiles('RADAR',[radarLayer]);
    radarTimer=setInterval(()=>{ if(!document.hidden && radarLayer){
      watchTiles('RADAR',[radarLayer]);
      radarLayer.setParams({_refresh:Math.floor(Date.now()/300000)});
    } },300000);
  }else if(!on && radarLayer){
    clearInterval(radarTimer); radarTimer=null; map.removeLayer(radarLayer); radarLayer=null;
  }
}
document.getElementById('radarBtn').onclick=()=>setRadar(!radarLayer);
// Live GOES GeoColor (NASA GIBS, keyless). ON by default; GIBS's `default` time
// endpoint always serves the newest ~10-min frame, so a stamp that ticks once per
// frame window re-requests tiles each cycle (and on tab return) to stay live.
// Sits under the sky-lighting panes, so the celestial grade applies to real clouds.
let goesLayers=null, goesTimer=null;
const GOES_SATS=['GOES-West_ABI_GeoColor','GOES-East_ABI_GeoColor'];
const goesUrl=l=>`https://gibs.earthdata.nasa.gov/wmts/epsg3857/best/${l}/default/default/GoogleMapsCompatible_Level7/{z}/{y}/{x}.png?v=${Math.floor(Date.now()/6e5)}`;
function goesRefresh(){
  if(goesLayers){ watchTiles('SATELLITE',goesLayers); goesLayers.forEach((t,i)=>t.setUrl(goesUrl(GOES_SATS[i]))); }
}
// own pane: guaranteed above the GL basemap (tilePane, z auto) regardless of load
// order — GOES starts before the async atlas style resolves — and below the sky panes
map.createPane('goes');
map.getPane('goes').style.zIndex = 210;
map.getPane('goes').style.pointerEvents = 'none';
function setGoes(on){
  const btn=document.getElementById('goesBtn');
  btn.classList.toggle('on',on);
  btn.setAttribute('aria-pressed',String(on));
  if(on && !goesLayers){
    goesLayers=GOES_SATS.map(l=>L.tileLayer(goesUrl(l),
      {pane:'goes',maxNativeZoom:7,maxZoom:19,opacity:.65,attribution:'GOES © NOAA / NASA GIBS'}).addTo(map));
    watchTiles('SATELLITE',goesLayers);
    goesTimer=setInterval(()=>{ if(!document.hidden) goesRefresh(); },600000);
  }else if(!on && goesLayers){
    clearInterval(goesTimer); goesTimer=null;
    goesLayers.forEach(l=>map.removeLayer(l)); goesLayers=null;
  }
}
document.getElementById('goesBtn').onclick=()=>setGoes(!goesLayers);
setGoes(false);                 // expensive imagery is opt-in; alert field stays primary

// re-render (no refetch) when the visible area changes — keeps everything scoped to view
let moveT=null;
map.on('moveend zoomend',()=>{ clearTimeout(moveT); moveT=setTimeout(draw,120); });

async function loadMetros(){
  let metros=await withLoad('FEEDS',async()=>{
    try{ return await (await fetch('/live/metros')).json(); }catch(e){ return []; }
  });
  const sel=document.getElementById('metro'); sel.innerHTML='';
  const all=document.createElement('option');
  all.value='__all__'; all.textContent=`NATIONAL OVERVIEW · ${metros.length} FEEDS`;
  sel.appendChild(all);
  metros.forEach(m=>{
    if(m.center) CENTERS[m.metro]=m.center;
    LIVE_METROS.add(m.metro);
    const o=document.createElement('option');
    o.value=m.metro; o.textContent=(m.state?`[${m.state}] `:'')+m.name.slice(0,46);
    sel.appendChild(o);
  });
}

// The server owns the 15-second cadence; browsers receive changed snapshots over one
// long-lived connection. A slow safety refresh preserves service behind SSE-hostile
// proxies and on older browsers without returning to high-frequency polling.
function restartStream(){
  if(eventStream){ eventStream.close(); eventStream=null; }
  if(fallbackTimer){ clearInterval(fallbackTimer); fallbackTimer=null; }
  if(paused) return;
  fallbackTimer=setInterval(load,60000);
  if(!window.EventSource) return;
  const metro=document.getElementById('metro').value;
  const hours=winHours();
  eventStream=new EventSource(`/live/stream?metro=${encodeURIComponent(metro)}&max_age_hours=${encodeURIComponent(hours)}`);
  eventStream.addEventListener('snapshot',event=>{
    try{
      const payload=JSON.parse(event.data);
      if(payload.metro===document.getElementById('metro').value) load(payload.incidents||[]);
    }catch(_){ document.getElementById('status').textContent='STREAM ERROR'; }
  });
  eventStream.addEventListener('upstream_error',()=>{
    document.getElementById('status').textContent='UPSTREAM DEGRADED';
  });
  eventStream.onerror=()=>{
    document.getElementById('status').textContent='RECONNECTING';
  };
}

document.addEventListener('visibilitychange',()=>{
  paused=document.hidden;
  if(paused){
    if(eventStream){ eventStream.close(); eventStream=null; }
    if(fallbackTimer){ clearInterval(fallbackTimer); fallbackTimer=null; }
  }else{
    load(); restartStream(); goesRefresh();
  }
});

(async ()=>{
  await loadMetros();
  document.getElementById('metro').value='__all__';   // default: live national overview
  map.fitBounds(US_BOUNDS,{padding:[20,20]});
  await load();
  restartStream();
})();
</script>
